name: Java Maven Build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - 'CHANGELOG.md'
      - '**/CHANGELOG.md'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - 'CHANGELOG.md'
      - '**/CHANGELOG.md'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: maven

    - name: Show versions
      run: java -version && ./mvnw -version && gpg --version

    - name: Cache SonarCloud packages
      uses: actions/cache@v5
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Import GPG key
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.OSS_SONATYPE_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.OSS_SONATYPE_GPG_PASSPHRASE }}

    - name: Build and verify with Maven
      if: github.event_name != 'push' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./mvnw clean verify -U -B --file pom.xml -s settings.xml

    - name: Build and deploy with Maven
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OSS_SONATYPE_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
        OSS_SONATYPE_TOKEN: ${{ secrets.OSS_SONATYPE_TOKEN }}
        OSS_SONATYPE_GPG_PASSPHRASE: ${{ secrets.OSS_SONATYPE_GPG_PASSPHRASE }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./mvnw clean deploy jacoco:report sonar:sonar -Pcentral-sonatype-release -U -B --file pom.xml -s settings.xml
